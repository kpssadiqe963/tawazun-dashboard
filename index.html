<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>INJAZ Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .login-box, .dashboard {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      margin-top: 40px;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
    }

    .motto {
      text-align: center;
      color: gray;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border: none;
      background: #3498db;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #2980b9;
    }

    .section {
      margin-top: 30px;
    }

    .section h2 {
      color: #34495e;
      border-bottom: 2px solid #ddd;
      padding-bottom: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    table th, table td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    table th {
      background: #3498db;
      color: white;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div class="login-box" id="loginBox">
    <h1>INJAZ DASHBOARD</h1>
    <div class="motto">Academic Bank of Credits</div>

    <input type="text" id="admission" placeholder="Type your Admission Number">

    <button onclick="login()">Go to Dashboard</button>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard hidden" id="dashboard">

    <h1>Welcome</h1>
    <p><b>Admission Number:</b> <span id="admDisplay"></span></p>
    
<div style="display:flex; justify-content:flex-end; margin-bottom:10px;">
  <a href="https://script.google.com/macros/s/AKfycbyq_L8JGziNeCiD3Wm_rJr3R1B-cirCrjVy03DwaeGs-cy-uJlWaGm-T86mvTyY6fJy/exec">
    <button style="
      background:#2ecc71;
      padding:6px 12px;
      font-size:14px;
      width:auto;
      border-radius:6px;
    ">
      ⬅ Back
    </button>
  </a>
</div>
    <!-- Pending -->
    <div class="section">
      <h2>Pending Applications</h2>
      <table id="pendingTable">
        <tr>
          <th>Course Code</th>
          <th>Course Title</th>
        </tr>
      </table>
    </div>

    <!-- Active -->
    <div class="section">
      <h2>Active Courses</h2>
      <table id="activeTable">
        <tr>
          <th>Course Code</th>
          <th>Course Title</th>
          <th>Credits</th>
          <th>Start Date</th>
          <th>Duration</th>
          <th>End Date</th>
        </tr>
      </table>
    </div>

    <!-- Completed -->
    <div class="section">
      <h2>Completed Courses</h2>
      <table id="completedTable">
        <tr>
          <th>Course Code</th>
          <th>Course Title</th>
          <th>Credits</th>
          <th>Completion Date</th>
        </tr>
      </table>
    </div>

  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwiT-UZ8AHmXMTyvQThrn6sEeFkVz1Ba8e3eydeJ39xc_Q9EuFXF4ro_Mn01cGob3WIvQ/exec";

function login() {
  let admission = document.getElementById("admission").value;

  fetch(API_URL, {
    method: "POST",
    body: new URLSearchParams({
      admission: admission
    })
  })
  .then(res => res.json())
  .then(data => {

    if (data.status === "success") {

      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("dashboard").classList.remove("hidden");

      document.getElementById("admDisplay").innerText = admission;

      fillTable("pendingTable", data.pending);
      fillTable("activeTable", data.active);
      fillTable("completedTable", data.completed);

    } else {
      alert("No Course Data Found");
    }

  });
}

function fillTable(tableId, rows) {
  let table = document.getElementById(tableId);

  rows.forEach(r => {
    let row = table.insertRow();

    r.forEach(cell => {
      let td = row.insertCell();
      td.innerText = cell;
    });
  });
}

</script>

</body>
</html>
