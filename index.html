<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    /* LOGIN PAGE */
    #loginPage {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to right, #4facfe, #00f2fe);
    }

    .login-box {
      background: white;
      padding: 30px;
      width: 300px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      background: #4facfe;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    /* DASHBOARD */
    #dashboardPage {
      display: none;
    }

    .header {
      background: #4facfe;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      padding: 20px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      width: 220px;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .indhar { border-top: 5px solid #ff9800; }
    .ayquna { border-top: 5px solid #4caf50; }
    .total { border-top: 5px solid #2196f3; }

    h2 {
      margin: 10px 0;
    }

    .logout {
      margin-top: 10px;
      background: red;
    }

  </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="login-box">
    <h2>Student Login</h2>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
  </div>
</div>

<!-- DASHBOARD PAGE -->
<div id="dashboardPage">
  <div class="header">
    <h1 id="name"></h1>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <div class="container">
    <div class="card indhar">
      <h3>Indhar Points</h3>
      <h2 id="indhar"></h2>
    </div>

    <div class="card ayquna">
      <h3>Ayquna Points</h3>
      <h2 id="ayquna"></h2>
    </div>

    <div class="card total">
      <h3>Total Points</h3>
      <h2 id="total"></h2>
    </div>
  </div>
</div>

<script>

function login() {
  var username = document.getElementById("username").value;
  var password = document.getElementById("password").value;

  fetch("https://script.google.com/macros/s/AKfycbxwsu7-YGt9SY4j5FsLW4HxXLs6GeSo1Q2mWR5Y_bePhG7h9BPCF9QD6EBwncbwbBj5dg/exec", {
    method: "POST",
    body: new URLSearchParams({
      username: username,
      password: password
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.status === "success") {

      // Fill data
      document.getElementById("name").innerText = "Welcome " + data.name;
      document.getElementById("indhar").innerText = data.indhar;
      document.getElementById("ayquna").innerText = data.ayquna;
      document.getElementById("total").innerText = data.total;

      // Switch pages
      document.getElementById("loginPage").style.display = "none";
      document.getElementById("dashboardPage").style.display = "block";

    } else {
      document.getElementById("error").innerText = "Invalid Login";
    }
  });
}

function logout() {
  document.getElementById("dashboardPage").style.display = "none";
  document.getElementById("loginPage").style.display = "flex";

  // Clear inputs
  document.getElementById("username").value = "";
  document.getElementById("password").value = "";
}

</script>

</body>
</html>
